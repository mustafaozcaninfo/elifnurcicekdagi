name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "elif-nur-worker/**"
      - "elif-nur-landing/**"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: elif-nur-worker/package-lock.json

      - name: Install landing dependencies
        working-directory: elif-nur-landing
        run: npm ci

      - name: Build landing page
        working-directory: elif-nur-landing
        run: npm run build

      - name: Install worker dependencies
        working-directory: elif-nur-worker
        run: npm ci

      - name: Apply D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: elif-nur-worker
        run: npx wrangler d1 migrations apply elif-nur-db --remote

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v4
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: elif-nur-worker
          command: deploy

      - name: Verify deployment
        run: |
          curl -fsS --max-time 30 "https://elifnurcicekdagi.com/health" | grep -q '"ok":true'
