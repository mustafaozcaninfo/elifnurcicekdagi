name: Contact Form Digest

on:
  schedule:
    - cron: "15 * * * *"
  workflow_dispatch:

concurrency:
  group: contact-digest
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: elif-nur-worker/package-lock.json

      - name: Install dependencies
        working-directory: elif-nur-worker
        run: npm ci

      - name: Check for new contact submissions
        id: contacts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: elif-nur-worker
        run: |
          if node scripts/check-new-contacts.mjs 1 > /tmp/new-contacts.json; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "count=$(jq length /tmp/new-contacts.json)" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "count=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Open GitHub issue for new submissions
        if: steps.contacts.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("node:fs");
            const rows = JSON.parse(fs.readFileSync("/tmp/new-contacts.json", "utf8"));
            const title = `📬 ${rows.length} yeni iletişim formu — elifnurcicekdagi.com`;
            const body = [
              "Brevo kurulana kadar form bildirimleri bu issue üzerinden gelir (GitHub e-posta bildirimi).",
              "",
              ...rows.map((r) => [
                `### #${r.id} — ${r.created_at}`,
                `- **Ad:** ${r.name}`,
                `- **E-posta:** ${r.email}`,
                `- **Mesaj:** ${r.message_preview}`,
                "",
              ].join("\n")),
              "---",
              `Workflow: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join("\n");

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["contact-form"],
            });
