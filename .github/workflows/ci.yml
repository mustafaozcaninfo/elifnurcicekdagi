name: CI

on:
  pull_request:
    paths:
      - "elif-nur-worker/**"
      - ".github/workflows/**"
  push:
    branches: [main]
    paths:
      - "elif-nur-worker/**"
      - ".github/workflows/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: elif-nur-worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: elif-nur-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Worker types
        run: npm run cf-typegen

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test -- --run
