<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Sayfa bulunamadı — Elif Nur Çiçekdağı</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      background: linear-gradient(145deg, #fdf6f0 0%, #f5e6dc 40%, #e8d5c4 100%);
      color: #3d2c29;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      max-width: 480px;
      width: 100%;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      box-shadow: 0 20px 60px rgba(61, 44, 41, 0.12);
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.6);
    }
    .code {
      font-family: system-ui, sans-serif;
      font-size: 4rem;
      font-weight: 200;
      color: #b07d6a;
      line-height: 1;
      margin-bottom: 0.5rem;
    }
    h1 {
      font-size: 1.35rem;
      font-weight: 400;
      margin-bottom: 0.75rem;
      color: #2a1f1c;
    }
    p {
      font-family: system-ui, sans-serif;
      font-size: 0.95rem;
      color: #7a635c;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    nav {
      font-family: system-ui, sans-serif;
      font-size: 0.9rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
      justify-content: center;
    }
    a { color: #b07d6a; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="card">
    <p class="code" aria-hidden="true">404</p>
    <h1>Sayfa bulunamadı</h1>
    <p>Aradığınız adres mevcut değil veya taşınmış olabilir.</p>
    <nav>
      <a href="/">Ana sayfa</a>
      <a href="/iletisim">İletişim</a>
      <a href="/gizlilik">Gizlilik</a>
    </nav>
  </main>
</body>
</html>
