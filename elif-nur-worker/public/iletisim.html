<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Elif Nur Çiçekdağı ile iletişime geçin" />
  <title>İletişim — Elif Nur Çiçekdağı</title>
  <link rel="canonical" href="https://elifnurcicekdagi.com/iletisim" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="İletişim — Elif Nur Çiçekdağı" />
  <meta property="og:description" content="Elif Nur Çiçekdağı ile iletişime geçin" />
  <meta property="og:url" content="https://elifnurcicekdagi.com/iletisim" />
  <meta property="og:image" content="https://elifnurcicekdagi.com/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:type" content="image/png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://elifnurcicekdagi.com/og-image.png" />
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ContactPage",
    "name": "İletişim",
    "url": "https://elifnurcicekdagi.com/iletisim",
    "isPartOf": { "@type": "WebSite", "url": "https://elifnurcicekdagi.com/" }
  }
  </script>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      background: linear-gradient(145deg, #fdf6f0 0%, #f5e6dc 40%, #e8d5c4 100%);
      color: #3d2c29;
      padding: 2rem 1rem 3rem;
    }
    .wrap { max-width: 560px; margin: 0 auto; }
    nav {
      font-family: system-ui, sans-serif;
      font-size: 0.85rem;
      margin-bottom: 2rem;
    }
    nav a { color: #9a7b72; text-decoration: none; }
    nav a:hover { color: #b07d6a; }
    .card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      box-shadow: 0 20px 60px rgba(61, 44, 41, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.6);
    }
    h1 {
      font-size: clamp(1.6rem, 4vw, 2rem);
      font-weight: 400;
      margin-bottom: 0.5rem;
      color: #2a1f1c;
    }
    .sub {
      font-family: system-ui, sans-serif;
      font-size: 0.95rem;
      color: #9a7b72;
      margin-bottom: 2rem;
    }
    label {
      display: block;
      font-family: system-ui, sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      color: #5c4842;
      margin-bottom: 0.35rem;
    }
    input, textarea {
      width: 100%;
      font: inherit;
      font-family: system-ui, sans-serif;
      padding: 0.65rem 0.75rem;
      border: 1px solid #e0cfc4;
      border-radius: 10px;
      margin-bottom: 1.1rem;
      background: #fff;
      color: #3d2c29;
    }
    textarea { min-height: 140px; resize: vertical; }
    .hp { position: absolute; left: -9999px; opacity: 0; }
    button {
      font-family: system-ui, sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 999px;
      background: #b07d6a;
      color: #fff;
      cursor: pointer;
      margin-top: 0.5rem;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .turnstile { margin-bottom: 1rem; }
    #status {
      font-family: system-ui, sans-serif;
      font-size: 0.9rem;
      margin-top: 1rem;
      min-height: 1.25rem;
    }
    #status.ok { color: #4a7c59; }
    #status.err { color: #a04444; }
    .consent {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      font-family: system-ui, sans-serif;
      font-size: 0.85rem;
      font-weight: 400;
      color: #5c4842;
      margin-bottom: 1rem;
    }
    .consent input { width: auto; margin: 0.2rem 0 0; }
    .consent a { color: #b07d6a; }
  </style>
</head>
<body>
  <div class="wrap">
    <nav><a href="/">← Ana sayfa</a></nav>
    <main class="card">
      <h1>İletişim</h1>
      <p class="sub">Mesajınız güvenli bir şekilde iletilir.</p>
      <form id="contact-form">
        <label for="name">Ad Soyad</label>
        <input id="name" name="name" type="text" required maxlength="120" autocomplete="name" />
        <label for="email">E-posta</label>
        <input id="email" name="email" type="email" required maxlength="254" autocomplete="email" />
        <label for="message">Mesaj</label>
        <textarea id="message" name="message" required maxlength="5000"></textarea>
        <label class="hp" for="website">Website</label>
        <input class="hp" id="website" name="website" type="text" tabindex="-1" autocomplete="off" />
        <label class="consent">
          <input id="consent" name="consent" type="checkbox" required />
          <span><a href="/gizlilik">Gizlilik politikasını</a> okudum; kişisel verilerimin iletişim amacıyla işlenmesini kabul ediyorum.</span>
        </label>
        <div class="turnstile cf-turnstile" data-sitekey="0x4AAAAAADh3UKIeub4N8frd"></div>
        <button type="submit" id="submit-btn">Gönder</button>
        <p id="status" role="status" aria-live="polite"></p>
      </form>
    </main>
  </div>
  <script src="/iletisim.js" defer></script>
</body>
</html>
